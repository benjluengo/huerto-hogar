<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto - HUERTO HOGAR</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/product-detail-enhancements.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <a href="../index.html" class="nav-brand">
            🥕 Huerto Hogar
        </a>
        <div class="nav-menu">
            <li><a href="../index.html" class="nav-link">Inicio</a></li>
            <li><a href="env-impact.html" class="nav-link">Nosotros</a></li>
            <li><a href="blog.html" class="nav-link">Blog</a></li>
            <li><a href="contact.html" class="nav-link">Contacto</a></li>
            <li><a href="productos.html" class="nav-link active">Productos</a></li>
        </div>
        <div class="nav-actions">
            <a href="cart.html" class="cart-icon">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="cart-count">0</span>
            </a>
            <div class="nav-user">
                <div class="user-menu">
                    <button class="user-icon" onclick="toggleUserMenu()">
                        <i class="fa-solid fa-user"></i>
                    </button>
                    <div class="user-dropdown" id="userDropdown">
                        <a href="pages/login.html" class="dropdown-item">
                            <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                        </a>
                        <a href="pages/register.html" class="dropdown-item">
                            <i class="fas fa-user-plus"></i> Registrarse
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <section class="product-detail-section">
            <div class="container">
                <div class="product-detail">
                    <div class="product-image-large">
                        <img id="productImage" src="" alt="">
                    </div>
                    <div class="product-info-detail">
                        <h1 id="productName" class="product-title"></h1>
                        <p id="productPrice" class="product-price-detail"></p>
                        <p id="productStock" class="product-stock-detail"></p>
                        <div class="quantity-selector">
                            <label for="quantity">Cantidad:</label>
                            <button class="quantity-btn" onclick="decreaseQuantity()">-</button>
                            <input type="number" id="quantity" value="1" min="1" max="99">
                            <button class="quantity-btn" onclick="increaseQuantity()">+</button>
                        </div>
                        <button class="add-to-cart-btn" onclick="addToCart()">
                            <i class="fas fa-shopping-cart"></i> Agregar al Carrito
                        </button>
                        <div class="product-description-extended">
                            <h3>Descripción</h3>
                            <p id="productDescription"></p>
                        </div>
                        <div class="product-origin">
                            <h3>Origen del Producto</h3>
                            <p id="productOrigin"></p>
                        </div>
                        <div class="product-sustainable">
                            <h3>Prácticas Sostenibles</h3>
                            <p id="productSustainablePractices"></p>
                        </div>
                        <div class="product-share">
                            <h3>Compartir en Redes Sociales</h3>
                            <div class="share-buttons">
                                <button class="share-btn facebook" onclick="shareProduct('facebook')" aria-label="Compartir en Facebook">
                                    <i class="fab fa-facebook-f"></i> Facebook
                                </button>
                                <button class="share-btn twitter" onclick="shareProduct('twitter')" aria-label="Compartir en Twitter">
                                    <i class="fab fa-twitter"></i> Twitter
                                </button>
                                <button class="share-btn whatsapp" onclick="shareProduct('whatsapp')" aria-label="Compartir en WhatsApp">
                                    <i class="fab fa-whatsapp"></i> WhatsApp
                                </button>
                                <button class="share-btn copy" onclick="shareProduct('copy')" aria-label="Copiar enlace">
                                    <i class="fas fa-link"></i> Copiar enlace
                                </button>
                            </div>
                        </div>
                        <div class="product-recipes">
                            <h3>Recetas Sugeridas</h3>
                            <ul id="productRecipes"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Sección de Productos Recomendados -->
        <section class="recommended-products-section">
            <div class="container">
                <h2 class="section-title">También te puede interesar</h2>
                <div class="recommended-products-grid" id="recommendedProductsGrid">
                    <!-- Los productos se cargarán dinámicamente con JavaScript -->
                </div>
            </div>
        </section>
    </main>

    <script src="../js/script.js"></script>
    <script src="../js/product-detail.js"></script>
</body>

</html>
