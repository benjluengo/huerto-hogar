<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Test de Reseñas y Calificaciones</title>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
        /* Additional styles to ensure review stars and list are styled */
        .average-rating {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            color: #f39c12;
            font-weight: 600;
        }
        .average-rating .stars {
            font-size: 1.8rem;
            letter-spacing: 2px;
        }
        .reviews-list {
            list-style: none;
            padding: 0;
            margin-bottom: 1.5rem;
            max-height: 300px;
            overflow-y: auto;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }
        .review-item {
            border-bottom: 1px solid #eee;
            padding: 1rem 0;
            transition: background-color 0.3s ease;
            border-radius: 8px;
        }
        .review-item:hover {
            background-color: #f9f9f9;
        }
        .review-rating {
            color: #f39c12;
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        .review-text {
            font-size: 1.1rem;
            color: #333;
            line-height: 1.4;
            white-space: pre-wrap;
        }
        .rating-input {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-start;
            gap: 0.25rem;
        }
        .rating-input input[type="radio"] {
            display: none;
        }
        .rating-input label {
            font-size: 2.4rem;
            color: #ccc;
            cursor: pointer;
            transition: color 0.2s ease-in-out;
        }
        .rating-input input[type="radio"]:checked ~ label,
        .rating-input label:hover,
        .rating-input label:hover ~ label {
            color: #f39c12;
        }
        .review-form textarea {
            resize: vertical;
            min-height: 100px;
            padding: 0.75rem;
            font-size: 1.1rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            transition: border-color 0.3s ease;
        }
        .review-form textarea:focus {
            outline: none;
            border-color: #2E8B57;
            box-shadow: 0 0 5px rgba(46, 139, 87, 0.4);
        }
        .review-form button.btn-primary {
            align-self: flex-start;
            padding: 0.75rem 1.5rem;
            font-size: 1.1rem;
            background-color: #2E8B57;
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
            box-shadow: 0 4px 12px rgba(46, 139, 87, 0.3);
        }
        .review-form button.btn-primary:hover {
            background-color: #1f5f3f;
            box-shadow: 0 6px 16px rgba(31, 95, 63, 0.5);
        }
    </style>
</head>
<body>
    <section class="product-reviews" aria-label="Sección de reseñas y calificaciones">
        <h3>Reseñas y Calificaciones</h3>
        <div id="averageRating" class="average-rating" aria-label="Calificación promedio">Calificación promedio: <span class="stars">&#9733;&#9733;&#9733;&#9733;&#9734;</span> (4.0)</div>
        <ul id="reviewsList" class="reviews-list" aria-live="polite" aria-relevant="additions">
            <li class="review-item">
                <div class="review-rating">&#9733;&#9733;&#9733;&#9733;&#9734;</div>
                <div class="review-text">Muy buen producto, me encantó la calidad y frescura.</div>
            </li>
            <li class="review-item">
                <div class="review-rating">&#9733;&#9733;&#9733;&#9733;&#9733;</div>
                <div class="review-text">Excelente atención y entrega rápida.</div>
            </li>
            <li class="review-item">
                <div class="review-rating">&#9733;&#9733;&#9733;&#9734;&#9734;</div>
                <div class="review-text">El producto llegó en buen estado, pero el empaque podría mejorar.</div>
            </li>
        </ul>
        <form id="reviewForm" class="review-form" aria-label="Formulario para dejar una reseña">
            <label for="rating">Calificación:</label>
            <div id="ratingInput" class="rating-input" role="radiogroup" aria-labelledby="ratingLabel">
                <input type="radio" id="star5" name="rating" value="5" aria-label="5 estrellas" />
                <label for="star5" title="5 estrellas">&#9733;</label>
                <input type="radio" id="star4" name="rating" value="4" aria-label="4 estrellas" />
                <label for="star4" title="4 estrellas">&#9733;</label>
                <input type="radio" id="star3" name="rating" value="3" aria-label="3 estrellas" />
                <label for="star3" title="3 estrellas">&#9733;</label>
                <input type="radio" id="star2" name="rating" value="2" aria-label="2 estrellas" />
                <label for="star2" title="2 estrellas">&#9733;</label>
                <input type="radio" id="star1" name="rating" value="1" aria-label="1 estrella" />
                <label for="star1" title="1 estrella">&#9733;</label>
            </div>
            <label for="reviewText">Reseña:</label>
            <textarea id="reviewText" name="reviewText" rows="4" placeholder="Escribe tu reseña aquí..." required></textarea>
            <button type="submit" class="btn-primary">Enviar Reseña</button>
        </form>
    </section>
</body>
</html>
